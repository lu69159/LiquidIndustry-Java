#MAIN CAMPAIGNS
sector.液体工艺-测试区.name = Test Zone
sector.液体工艺-测试区.description = First map of this mod. Just for testing.

sector.液体工艺-狭长冰谷.name = Narrow Ice Valley
sector.液体工艺-狭长冰谷.description = A sunless valley with scarce minerals. Begin exploring liquid resource utilization here.\nDo not let your guard down even if time seems plentiful early on.

sector.液体工艺-极冰溶洞.name = Glacial Cave
sector.液体工艺-极冰溶洞.description = A massive open cave eroded by cryogenic liquids, occupied by enemies.\nSalvage nearby ruins, research advanced liquid technologies to utilize waste, and destroy all enemy cores as soon as possible.
sector.液体工艺-极冰溶洞.details = Planned to redo

sector.液体工艺-永夜荒地.name = Eternal Wasteland
sector.液体工艺-永夜荒地.description = A ruin deep within the glacial cave\nResearch technologies for extracting synthetic materials from waste, and build defenses before the main enemy force arrives.
sector.液体工艺-永夜荒地.credit = Dimension

sector.液体工艺-极光壁垒.name = Aurora Bastion
sector.液体工艺-极光壁垒.description = Deeper into the cave, enemy forces hold this area to guard prototype weapon tech.\nDestroy all enemy cores and unlock tier-3 liquid resource technologies.\nDo not delay; enemy reinforcements will counterattack.

sector.液体工艺-暗潮冻港.name = 暗潮冻港
sector.液体工艺-暗潮冻港.description = 尼普顿庞大的地下暗河体系中的一处废弃港湾，涨潮带来的冷冻液淹没了部分区域，但遗留的钻井平台似乎还能使用。\n抵御追击的敌人，并研究高级液体科技。\n(说不准什么时候会退潮......)

#SIDE CAMPAIGNS
sector.液体工艺-蛇行道.name = Serpent Path
sector.液体工艺-蛇行道.description = [#00FFFF]Side Map\n[yellow]Unlocks Super Cryofluid, Ambush and later tech\nUnlocks Crab\n[white]A ruin of Nepture's ancient civilization sits in a narrow cave passage. Hold off enemy assaults to let logistics teams research its tech.

sector.液体工艺-地火.name = Underground Inferno
sector.液体工艺-地火.description = [#00FFFF]Side Map\n[yellow]Unlocks Multiplicative Direct Fabricator and later tech\n[white]Scouts have found a lava channel, where enemy direct fabricator tech is located.\nHold off enemy counterattacks until research completes.

sector.液体工艺-暴雪前哨.name = Blizzard Outpost
sector.液体工艺-暴雪前哨.description = [#00FFFF]Side Map\n[yellow]Unlocks Waste Extractor and later tech\n[white]Our advance force has broken through the lava channel, and returned to the surface of Nepture. But conditions are far harsher than underground…\nHold the outpost in severe weather and wait for rear support.

