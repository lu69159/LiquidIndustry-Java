block.液体工艺-冷冻液抽取机.description = Extracts cryofluid in cold terrain.

block.液体工艺-冰冷钻井.name = Advanced Cryofluid Extractor
block.液体工艺-冰冷钻井.description = Extracts cryofluid violently using solid cryofluid. Consumes massive water.
block.液体工艺-冰冷钻井.details = High output.

