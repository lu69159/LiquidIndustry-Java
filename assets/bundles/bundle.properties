block.液体工艺-大型载荷传送带.name = Large Payload Conveyor
block.液体工艺-大型载荷传送带.description = Moves larger payloads.



#power
block.液体工艺-碳发电机.name = Carbon Generator
block.液体工艺-碳发电机.description = Consumes graphite to generate electricity, with higher efficiency than directly burning coal.
block.液体工艺-碳发电机.details = “Mini RTG”

block.液体工艺-恒温矿渣热发电机.name = Slag Crystal Generator
block.液体工艺-恒温矿渣热发电机.description = Generates power for free using its built-in constant-temp slag crystal.

block.液体工艺-恒温衰变热发电机.name = Decay Lava Crystal Generator
block.液体工艺-恒温衰变热发电机.description = Generates power for free using its built-in constant-temp decay lava crystal.

block.液体工艺-重水核反应堆.name = Heavy Water Nuclear Reactor
block.液体工艺-重水核反应堆.description = Uses heavy water as moderator to greatly improve power generation efficiency; still requires constant coolant supply.\nInsufficient coolant or moderator supply will cause violent explosion.
block.液体工艺-重水核反应堆.details = When heavy water is less than 10, coolant consumption will increase significantly.

block.液体工艺-衰变反应堆.name = 衰变反应堆
block.液体工艺-衰变反应堆.description = 使用固态冷冻液和重水控制剧烈的衰变反应，产生大量电力。\n没有固态冷冻液或重水或时试图启动反应堆会导致爆炸。\n未清除的副产物液体同样会导致爆炸。
block.液体工艺-衰变反应堆.details = 重水少于10时, 物品消耗速度会平方倍增加

block.液体工艺-爆燃反应炉.name = Deflagration Reactor
block.液体工艺-爆燃反应炉.description = Generates massive power by detonating solid oil, produces scrap, and requires super cryofluid for cooling.\nInsufficient super cryofluid or unremoved scrap will cause violent explosion!

block.液体工艺-超导节点.name = Superconducting Node
block.液体工艺-超导节点.description = Super power node with greatly enhanced connection range and max connections.

block.液体工艺-大型超导节点.name = Large Superconducting Node
block.液体工艺-大型超导节点.description = An advanced superconducting node with greater range.

block.液体工艺-超导电力塔.name = Superconducting Tower
block.液体工艺-超导电力塔.description = A long-range superconducting node with fewer available connections.

block.液体工艺-超导电池.name = Superconducting Battery
block.液体工艺-超导电池.description = Stores power in times of surplus energy. Outputs power in times of deficit.

block.液体工艺-大型超导电池.name = Large Superconducting Battery
block.液体工艺-大型超导电池.description = Stores power in times of surplus energy. Outputs power in times of deficit.\nHigher capacity than a standard superconducting battery.



