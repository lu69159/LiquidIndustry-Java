block.液体工艺-真空泵.description = Pumps and outputs liquids rapidly. Requires large amounts of power.

block.液体工艺-液体质驱.name = Liquid Mass Driver
block.液体工艺-液体质驱.description = Long-range liquid transport structure. Cannot transport gases.

block.液体工艺-微型液体质驱.name = Micro Liquid Mass Driver
block.液体工艺-微型液体质驱.description = Micro liquid transport structure. Cannot transport gases.



