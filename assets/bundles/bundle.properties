block.液体工艺-大型超能墙.name = Large Omni Wall Liquid Tank
block.液体工艺-大型超能墙.description = Protects structures from enemy projectiles. Combines all wall liquid tank properties. Can be placed on deep water.

block.液体工艺-巨型超能墙.name = Huge Omni Wall Liquid Tank
block.液体工艺-巨型超能墙.description = Protects structures from enemy projectiles. Combines all wall liquid tank properties. Can be placed on deep water.

block.液体工艺-力场墙.name = Force Wall
block.液体工艺-力场墙.description = Protects structures from enemy projectiles. Deploys a shield that blocks enemy units and absorbs most projectiles when power is provided. Can absorb lasers. Can conduct power. \nAllows allied units to pass through.

block.液体工艺-基地墙体.name = Base Wall



#production
block.液体工艺-冰冷废液分离机.name = Waste Separator
block.液体工艺-冰冷废液分离机.description = Separates frigid waste into mineral components unstably and inefficiently. Can produce titanium.

block.液体工艺-一级废液解离机.name = Waste Dissociator
block.液体工艺-一级废液解离机.description = Separates concentrated waste into mineral components unstably and inefficiently.\nCan produce thorium.

block.液体工艺-二级废液精馏器.name = Waste Rectifier
block.液体工艺-二级废液精馏器.description = Slowly extracts some synthetic materials from twice-concentrated waste.

block.液体工艺-三级精华转化器.name = Essence Converter
block.液体工艺-三级精华转化器.description = Efficiently extracts synthetic materials from tier-3 waste essence.

block.液体工艺-四级精华转化仪.name = Essence Transmuter
block.液体工艺-四级精华转化仪.description = Steadily extracts most usable materials.

block.液体工艺-终能聚合器.name = Essence Energy Polymerizer
block.液体工艺-终能聚合器.description = Consumes massive resources and power to extract mysterious matter.\nUnmanaged liquid byproducts will cause explosions.

block.液体工艺-神能破碎机.name = Divine Energy Crusher
block.液体工艺-神能破碎机.description = Crushes mysterious matter into more shards. Requires super cryofluid cooling.

block.液体工艺-精华提取源.name = Essence Item Source
block.液体工艺-精华提取源.description = Converts tier-5 concentrated essence into any item, except mysterious matter and mysterious shard.



block.液体工艺-废液离心机.name = Waste Centrifuge
block.液体工艺-废液离心机.description = Refines frigid waste into tier-1 refined waste and scrap.

block.液体工艺-再精炼高炉.name = Waste Re-refining Furnace
block.液体工艺-再精炼高炉.description = Extracts usable metals from tier-1 refined waste while continuing refining the remaining small amount of waste.

block.液体工艺-精华提取工厂.name = Essence Extraction Plant
block.液体工艺-精华提取工厂.description = Pyrolyzes tier-2 refined waste with slag to obtain waste essence.\nAdvice to use liquid unloaders to separate liquid outputs.

block.液体工艺-精华浓缩厂.name = Essence Concentrator
block.液体工艺-精华浓缩厂.description = Concentrates essence in tier-3 waste to meet extraction standards.

block.液体工艺-神能凝聚仪.name = Divine Energy Condenser
block.液体工艺-神能凝聚仪.description = Purifies divine essence from input.\n[red]Better not let it be destroyed.

block.液体工艺-聚能再精炼炉.name = Energy Waste Re-refinery
block.液体工艺-聚能再精炼炉.description = Smaller size, no item output, but greatly improved liquid refining capability.



block.液体工艺-废液混合器.name = Waste Mixer
block.液体工艺-废液混合器.description = Mixes cryofluid and scrap to produce frigid waste.\nUsed to get frigid waste on other planets.
block.液体工艺-废液混合器.details = How does it work?

block.液体工艺-冷冻液搅拌机.name = Cryofluid Blender
block.液体工艺-冷冻液搅拌机.description = Converts small amount of cryofluid into more via reactions between titanium, hydrophilic matter and cryofluid.

block.液体工艺-超冷混合器.name = Super Cryofluid Mixer
block.液体工艺-超冷混合器.description = Mixes cryofluid and tier-3 waste essence to produce super cryofluid.

block.液体工艺-重水生产器.name = Heavy Water Producer
block.液体工艺-重水生产器.description = Produces heavy water from thorium and water.

block.液体工艺-高炉.name = Furnace
block.液体工艺-高炉.description = Melts down massive scrap into slag rapidly.

block.液体工艺-大型粉碎机.name = Large Pulverizer
block.液体工艺-大型粉碎机.description = Crushes scrap into fine sand with higher efficiency.

block.液体工艺-煤粉碎机.name = Coal Pulverizer
block.液体工艺-煤粉碎机.description = Crushes coal into carbon powder.

block.液体工艺-晶体熔铸器.name = Crystal Meltor
block.液体工艺-晶体熔铸器.description = Produces heat-resistant crystal from carbon powder and hydrophilic matter.

block.液体工艺-亲水质合成器.name = Hydrophilic Matter Synthesizer
block.液体工艺-亲水质合成器.description = Synthesizes hydrophilic matter from graphite and water.

block.液体工艺-治愈质压缩机.name = Healing Matter Compressor
block.液体工艺-治愈质压缩机.description = Produces healing matter from phase fabric and hydrophilic matter. Requires cryofuid cooling.

block.液体工艺-超导裂解器.name = Superconducting Cracker
block.液体工艺-超导裂解器.description = Electrolyze solid water into superconducting matter. Requires large amounts of power.

block.液体工艺-固液转化器.name = Solid-Liquid Converter
block.液体工艺-固液转化器.description = Uses small amount of hydrophilic matter to compress large volumes of liquid into solid form, or unpacks solidified liquids.

block.液体工艺-硅炉.name = Silicon Furnace
block.液体工艺-硅炉.description = Refines silicon from sand and graphite.

block.液体工艺-塑钢分解器.name = Plastanium Decomposer
block.液体工艺-塑钢分解器.description = Decomposes plastanium into oil and titanium.

block.液体工艺-相织布分解器.name = Phase Fabric Decomposer
block.液体工艺-相织布分解器.description = Decomposes phase fabric into thorium and sand.

block.液体工艺-巨浪合金分解器.name = Surge Alloy Decomposer
block.液体工艺-巨浪合金分解器.description = Decomposes surge alloy into copper, lead, titanium, and silicon.



#distribution
block.液体工艺-双传带.name = Conveyorduit
block.液体工艺-双传带.description = Transports items and liquids simultaneously. Does not leak.

block.液体工艺-双传桥.name = Bridge Conveyorduit
block.液体工艺-双传桥.description = Transports items and liquids over terrain or buildings simultaneously.

block.液体工艺-双传交叉器.name = Item-Liquid Junction
block.液体工艺-双传交叉器.description = Acts as a bridge between a conveyor and a conduit.

block.液体工艺-双传路由器.name = Item-Liquid Router
block.液体工艺-双传路由器.description = Distributes items and fluids equally to all sides.
block.液体工艺-双传路由器.details = Far faster than chained standard routers.

block.液体工艺-钍传送带.name = Thorium Conveyor
block.液体工艺-钍传送带.description = Transports items forward at higher speed.

block.液体工艺-重甲传送轨道.name = Heavy Armor Rail
block.液体工艺-重甲传送轨道.description = Moves items forward. Does not accept non-conveyor inputs from the sides.\nHigh health and armor, ideal for frontlines. Deals arc damage when destroyed.

block.液体工艺-相织布卸载器.name = Phase Unloader
block.液体工艺-相织布卸载器.description = Unloads the selected item from nearby blocks. Faster than a standard unloader.

block.液体工艺-高压发射器.name = High-Pressure Ejector
block.液体工艺-高压发射器.description = Low-build-cost water-driven item transport structure.

block.液体工艺-微型质驱.name = Micro Mass Driver
block.液体工艺-微型质驱.description = Micro item transport structure.



#liquid
block.液体工艺-巨型储液罐.name = Huge Liquid Tank
block.液体工艺-巨型储液罐.description = Stores a massive amount of liquid. Outputs to all sides, similarly to a liquid router.

block.液体工艺-钛导管桥.name = Titanium Bridge Conduit
block.液体工艺-钛导管桥.description = Transports liquids over terrain or buildings. Longer range than the bridge conduit.

