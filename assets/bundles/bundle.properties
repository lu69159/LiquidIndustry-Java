block.液体工艺-大型合金装甲储液罐.name = Large Surge Wall Liquid Tank
block.液体工艺-大型合金装甲储液罐.description = Protects structures from enemy projectiles. Functions as a liquid tank with surge wall properties.

block.液体工艺-相织装甲储液罐.name = Phase Wall Liquid Tank
block.液体工艺-相织装甲储液罐.description = Protects structures from enemy projectiles. Functions as a liquid tank with phase wall properties.

block.液体工艺-大型相织装甲储液罐.name = Large Phase Wall Liquid Tank
block.液体工艺-大型相织装甲储液罐.description = Protects structures from enemy projectiles. Functions as a liquid tank with phase wall properties.

